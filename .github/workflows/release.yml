name: Release

# Build the native installers for macOS (universal DMG) and Windows (NSIS
# .exe) and attach them to a SINGLE GitHub Release whenever a version tag is
# pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Create the draft release once, up front, so both build legs upload to the
  # same release instead of racing to create two separate drafts.
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `BigJSON ${tag}`,
              body: [
                'Native builds for **macOS** (universal — Intel + Apple Silicon) and **Windows** (10/11, x64).',
                '',
                'Both builds are **unsigned**:',
                '- **macOS** — on first launch, right-click the app → **Open**, then confirm.',
                '- **Windows** — if SmartScreen appears, click **More info → Run anyway**.',
                '',
                'See the README for details.',
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon runner → universal build
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin --bundles dmg
          - platform: windows-latest
            rust_targets: ""
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, bundle, and upload to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Optional: set these repo secrets to ship a SIGNED + NOTARIZED macOS build ---
          # Requires an Apple Developer Program membership ($99/yr). Without them the
          # DMG is unsigned (users open it once via right-click → Open).
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
